<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>金工小子</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #eef5ff;
      }

      #root:empty {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 56%, rgba(7, 91, 212, 0.12), transparent 36%),
          linear-gradient(180deg, #f8fbff 0%, #e8f2ff 100%);
      }

      #root:empty::before {
        content: "";
        width: min(420px, 36vw);
        aspect-ratio: 11 / 7;
        border-radius: 44px;
        background:
          radial-gradient(circle at 34% 43%, #f7fbff 0 8%, transparent 8.5%),
          radial-gradient(circle at 66% 43%, #f7fbff 0 8%, transparent 8.5%),
          radial-gradient(ellipse at 50% 66%, #f7fbff 0 12%, transparent 12.5%),
          linear-gradient(180deg, #102d55, #08192d);
        border: 20px solid #ff8d22;
        box-shadow: 0 24px 70px rgba(48, 78, 116, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
